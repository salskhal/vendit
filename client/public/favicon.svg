<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- cream fill so it reads on light and dark browser chrome -->
  <circle cx="16" cy="16" r="15" fill="#f7f4ed"/>
  <!-- outer ring -->
  <circle cx="16" cy="16" r="14.5" stroke="#1c1c1c" stroke-width="1.5"/>
  <!-- inner ring -->
  <circle cx="16" cy="16" r="10" stroke="#1c1c1c" stroke-width="1" opacity="0.4"/>
  <!-- coin slot -->
  <rect x="13" y="9" width="6" height="2.4" rx="1.2" fill="#1c1c1c"/>
  <!-- center stem -->
  <path d="M16 13.5v9" stroke="#1c1c1c" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
</svg>
